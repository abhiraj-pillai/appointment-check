on:
  schedule:
    - cron: '0 8 * * 6'   # Saturday 8am UTC = 9am Frankfurt (winter)
    - cron: '0 7 * * 6'   # Saturday 7am UTC = 9am Frankfurt (summer/CEST)
    - cron: '0 8 * * *'   # Also run daily at 8am in case slots open mid-week
  workflow_dispatch:        # Manual trigger anytime from Actions tab

jobs:
  check-appointments:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          npm install @anthropic-ai/sdk puppeteer
          npx puppeteer browsers install chrome

      - name: Run appointment checker
        run: node check.js
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
